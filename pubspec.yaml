name: aura_app
description: Aura - Marketplace de experiencias y fitness en Argentina
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  url_launcher: ^6.3.1
  shimmer: ^3.0.0
  provider: ^6.1.2
  share_plus: ^10.1.4
  mobile_scanner: ^7.2.0
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
